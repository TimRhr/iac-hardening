---
# =============================================================================
# inventory/hosts.yml — Server-Inventar
# =============================================================================
# Gruppen-Variablen:  inventory/group_vars/<gruppe>/
# Host-Variablen:     inventory/host_vars/<hostname>.yml
# =============================================================================

all:
  children:

    # ── Webserver ─────────────────────────────────────────────────────────────
    webservers:
      hosts:
        web01:
          ansible_host: 192.168.1.10
        web02:
          ansible_host: 192.168.1.11

    # ── Datenbankserver ───────────────────────────────────────────────────────
    dbservers:
      hosts:
        db01:
          ansible_host: 192.168.1.20

    # ── Monitoring ────────────────────────────────────────────────────────────
    monitoring:
      hosts:
        mon01:
          ansible_host: 192.168.1.30

    # ── Alle produktiven Server ───────────────────────────────────────────────
    production:
      children:
        webservers:
        dbservers:
        monitoring:

  # Globale Verbindungs-Defaults
  vars:
    ansible_user: deploy
    ansible_ssh_private_key_file: >-
      {{ playbook_dir }}/../../ssh_keys/{{ inventory_hostname }}/id_ed25519
    ansible_python_interpreter: /usr/bin/python3
