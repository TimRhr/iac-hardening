# =============================================================================
# ansible.cfg — Zentrale Ansible-Konfiguration
# Liegt im Projekt-Root, gilt für alle Playbooks unter playbooks/
# =============================================================================

[defaults]
inventory           = inventory/hosts.yml
roles_path          = roles
collections_path    = collections
host_key_checking   = True
retry_files_enabled = False
stdout_callback     = yaml
interpreter_python  = auto_silent
gathering           = smart
fact_caching        = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout    = 3600

# Logging (alle Playbooks schreiben in dasselbe Log)
# log_path            = logs/ansible.log

[ssh_connection]
pipelining          = True
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30

[privilege_escalation]
become              = True
become_method       = sudo
become_ask_pass     = False

# Vault — Passwort-Datei (aktivieren wenn .vault_pass angelegt ist)
# vault_password_file = .vault_pass
