---
# =============================================================================
# playbooks/hardening/site.yml — Vollständiges Hardening
# Führt SSH- und OS-Härtung in einem Run durch.
#
# VERWENDUNG (vom Projekt-Root aus):
#   ansible-playbook playbooks/hardening/site.yml
#   ansible-playbook playbooks/hardening/site.yml --limit webservers
#   ansible-playbook playbooks/hardening/site.yml --tags ssh
#   ansible-playbook playbooks/hardening/site.yml --tags os
#   ansible-playbook playbooks/hardening/site.yml --check --diff
# =============================================================================

- name: "Bootstrap | Python sicherstellen"
  hosts: all
  gather_facts: false
  become: true
  tags: [always]
  tasks:
    - name: "Python3 installieren (raw)"
      ansible.builtin.raw: |
        test -e /usr/bin/python3 || (apt-get update -qq && apt-get install -y python3)
      changed_when: false

- name: "🔐 Hardening | SSH + OS"
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: "Info | Ziel-System"
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "  Host:  {{ inventory_hostname }} ({{ ansible_host }})"
          - "  OS:    {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      tags: [always]

    - name: "Vorbereitung | Lokale Output-Verzeichnisse anlegen"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - "{{ playbook_dir }}/../../ssh_keys"
        - "{{ playbook_dir }}/../../ssh_keys/backups"
        - "{{ playbook_dir }}/../../reports"
      delegate_to: localhost
      become: false
      run_once: true
      tags: [always]

  roles:
    - role: ssh_hardening
      tags: [ssh, hardening]

    - role: os_hardening
      tags: [os, hardening]

  post_tasks:
    - name: "🎉 Hardening abgeschlossen"
      ansible.builtin.debug:
        msg:
          - "✅ {{ inventory_hostname }} vollständig gehärtet"
          - "   SSH-Key: ../../ssh_keys/{{ inventory_hostname }}/id_ed25519"
          - "   Report:  ../../reports/{{ inventory_hostname }}_*.txt"
      tags: [always]
