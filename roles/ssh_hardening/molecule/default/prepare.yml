---
# =============================================================================
# prepare.yml — Minimale Vorbereitung des Test-Containers
# =============================================================================
- name: Prepare
  hosts: all
  gather_facts: false

  tasks:
    - name: "Prepare | Python sicherstellen"
      ansible.builtin.raw: |
        which python3 2>/dev/null && exit 0
        apt-get update -qq && apt-get install -y -q python3 2>/dev/null ||
        dnf install -y python3 2>/dev/null ||
        yum install -y python3 2>/dev/null
      changed_when: true

    - name: "Prepare | OpenSSH-Server installieren (Debian/Ubuntu)"
      ansible.builtin.raw: |
        dpkg -l openssh-server 2>/dev/null | grep -q '^ii' && exit 0
        apt-get update -qq && apt-get install -y -q openssh-server
      changed_when: true

    - name: "Prepare | OpenSSH-Server installieren (RHEL/Rocky)"
      ansible.builtin.raw: |
        rpm -q openssh-server 2>/dev/null && exit 0
        dnf install -y openssh-server 2>/dev/null || yum install -y openssh-server
      changed_when: true

    - name: "Prepare | sshd_config Verzeichnis sicherstellen"
      ansible.builtin.raw: mkdir -p /etc/ssh
      changed_when: true

    - name: "Prepare | SSH Host-Keys generieren falls nicht vorhanden"
      ansible.builtin.raw: |
        [ -f /etc/ssh/ssh_host_ed25519_key ] && exit 0
        ssh-keygen -A 2>/dev/null || true
      changed_when: true
