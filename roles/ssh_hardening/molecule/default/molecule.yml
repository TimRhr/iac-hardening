---
# =============================================================================
# roles/ssh_hardening/molecule/default/molecule.yml
# Molecule-Szenario: SSH-Hardening gegen Ubuntu 22.04 + Rocky Linux 9
# =============================================================================
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker

platforms:
  - name: ssh-ubuntu-22
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    command: /lib/systemd/systemd

  - name: ssh-rocky-9
    image: geerlingguy/docker-rockylinux9-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    command: /usr/lib/systemd/systemd

provisioner:
  name: ansible
  inventory:
    host_vars:
      ssh-ubuntu-22:
        ansible_user: root
      ssh-rocky-9:
        ansible_user: root
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../.."
    ANSIBLE_COLLECTIONS_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../../../../collections"

verifier:
  name: ansible

lint: |
  set -e
  yamllint .
  ansible-lint
