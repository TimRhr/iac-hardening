---
# =============================================================================
# SSH Hardening | Task-Datei: SSH-Key Management
# Generiert einen starken Ed25519-Key auf dem Controller, hinterlegt den
# Public Key auf dem Server und sichert den Private Key lokal verschlüsselt.
# =============================================================================

- name: "SSH Keys | Erstelle lokales Verzeichnis für SSH-Keys"
  ansible.builtin.file:
    path: "{{ ssh_key_local_dir }}/{{ inventory_hostname }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  tags: [ssh, keys, keygen]

- name: "SSH Keys | Prüfe ob Ed25519-Key bereits existiert"
  ansible.builtin.stat:
    path: "{{ ssh_key_local_dir }}/{{ inventory_hostname }}/id_ed25519"
  register: ssh_key_stat
  delegate_to: localhost
  become: false
  tags: [ssh, keys, keygen]

- name: "SSH Keys | Generiere Ed25519 Key-Pair (Controller → lokal)"
  community.crypto.openssh_keypair:
    path: "{{ ssh_key_local_dir }}/{{ inventory_hostname }}/id_ed25519"
    type: ed25519
    comment: "ansible-managed_{{ inventory_hostname }}_{{ ansible_date_time.date }}"
    mode: "0600"
    # Passphrase aus Vault oder leer lassen für vollautomatischen Betrieb
    passphrase: "{{ ssh_key_passphrase | default('') }}"
  register: ssh_keypair
  delegate_to: localhost
  become: false
  when: not ssh_key_stat.stat.exists or ssh_key_rotate | default(false)
  tags: [ssh, keys, keygen]

- name: "SSH Keys | Lese Public Key"
  ansible.builtin.slurp:
    src: "{{ ssh_key_local_dir }}/{{ inventory_hostname }}/id_ed25519.pub"
  register: ssh_pubkey_content
  delegate_to: localhost
  become: false
  tags: [ssh, keys, keygen]

- name: "SSH Keys | Stelle sicher, dass Deploy-User existiert"
  ansible.builtin.user:
    name: "{{ ssh_deploy_user }}"
    state: present
    shell: /bin/bash
    create_home: true
    groups: "{{ ssh_deploy_groups | join(',') }}"
    append: true
  tags: [ssh, keys, user]

- name: "SSH Keys | Erstelle .ssh Verzeichnis für Deploy-User"
  ansible.builtin.file:
    path: "/home/{{ ssh_deploy_user }}/.ssh"
    state: directory
    owner: "{{ ssh_deploy_user }}"
    group: "{{ ssh_deploy_user }}"
    mode: "0700"
  tags: [ssh, keys, user]

- name: "SSH Keys | Hinterlege Public Key auf dem Server"
  ansible.posix.authorized_key:
    user: "{{ ssh_deploy_user }}"
    state: present
    key: "{{ ssh_pubkey_content.content | b64decode }}"
    comment: "ansible-managed {{ ansible_date_time.date }}"
    exclusive: "{{ ssh_authorized_keys_exclusive | default(false) }}"
  tags: [ssh, keys, deploy]

- name: "SSH Keys | Erstelle Key-Fingerprint-Datei (Dokumentation)"
  ansible.builtin.copy:
    content: |
      # SSH Key Info - {{ inventory_hostname }}
      # Generiert: {{ ansible_date_time.iso8601 }}
      # Typ: Ed25519
      # Fingerprint: {{ ssh_keypair.fingerprint | default('siehe id_ed25519.pub') }}
      # Benutzer auf Server: {{ ssh_deploy_user }}
      # -------------------------------------------------------
      # Verwendung:
      #   ssh -i {{ ssh_key_local_dir }}/{{ inventory_hostname }}/id_ed25519 \
      #       {{ ssh_deploy_user }}@{{ ansible_host }} -p {{ ssh_port }}
    dest: "{{ ssh_key_local_dir }}/{{ inventory_hostname }}/README.txt"
    mode: "0600"
  delegate_to: localhost
  become: false
  tags: [ssh, keys, docs]

- name: "SSH Keys | Private Key als Backup-Archiv sichern (chmod 600)"
  community.general.archive:
    path: "{{ ssh_key_local_dir }}/{{ inventory_hostname }}/id_ed25519"
    dest: "{{ ssh_key_backup_dir }}/{{ inventory_hostname }}_ed25519_{{ ansible_date_time.date }}.tar.gz"
    mode: "0600"
    format: gz
  delegate_to: localhost
  become: false
  when: ssh_key_backup_enabled | default(true)
  tags: [ssh, keys, backup]

# ── Emergency Key (Break-Glass) ───────────────────────────────────────────────
- name: "SSH Keys | Emergency-Key deployen (Break-Glass Notfallzugang)"
  ansible.builtin.include_tasks: emergency_key.yml
  when: ssh_emergency_key_enabled | default(true)
  tags: [ssh, keys, emergency]

# ── Operator-Keys (Multi-Admin) ───────────────────────────────────────────────
- name: "SSH Keys | Operator-Keys deployen (Multi-Admin-Zugang)"
  ansible.builtin.include_tasks: operator_keys.yml
  when: ssh_operator_keys | default([]) | length > 0
  tags: [ssh, keys, operators]
