---
# =============================================================================
# SSH Hardening | Task-Datei: Verify & Rollback
# Testet nach dem Hardening ob SSH noch funktioniert.
# Bei Fehler: automatischer Rollback auf gesicherte Konfiguration.
# =============================================================================

- name: "Verify | Warte kurz bis sshd neugestartet ist"
  ansible.builtin.wait_for:
    timeout: 5
  delegate_to: localhost
  become: false
  tags: [ssh, verify]

- name: "Verify | Teste SSH-Erreichbarkeit auf neuem Port"
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ ssh_port }}"
    timeout: 15
    state: started
  delegate_to: localhost
  become: false
  register: verify_port_open
  ignore_errors: true
  tags: [ssh, verify]

- name: "Verify | Teste tatsächlichen SSH-Login mit neuem Key"
  ansible.builtin.command: >
    ssh
    -i {{ ssh_key_local_dir }}/{{ inventory_hostname }}/id_ed25519
    -o StrictHostKeyChecking=no
    -o ConnectTimeout=10
    -o BatchMode=yes
    -p {{ ssh_port }}
    {{ ssh_deploy_user }}@{{ ansible_host }}
    "echo SSH_OK"
  register: verify_ssh_login
  delegate_to: localhost
  become: false
  ignore_errors: true
  changed_when: false
  tags: [ssh, verify]

- name: "Verify | SSH-Login-Ergebnis auswerten"
  ansible.builtin.set_fact:
    ssh_verify_success: "{{ verify_port_open is not failed and 'SSH_OK' in verify_ssh_login.stdout }}"
  tags: [ssh, verify]

# ---- ROLLBACK ---------------------------------------------------------------

- name: "Rollback | INITIIERE Rollback (SSH-Login fehlgeschlagen)"
  ansible.builtin.debug:
    msg: |
      ❌ SSH-Verifikation FEHLGESCHLAGEN auf {{ inventory_hostname }}!
         Port erreichbar: {{ verify_port_open is not failed }}
         Login OK:        {{ 'SSH_OK' in (verify_ssh_login.stdout | default('')) }}
         → Starte automatischen Rollback auf Backup-Konfiguration...
  when: not ssh_verify_success
  tags: [ssh, verify, rollback]

- name: "Rollback | Stelle Original sshd_config wieder her"
  ansible.builtin.copy:
    src: /etc/ssh/sshd_config.backup
    dest: /etc/ssh/sshd_config
    remote_src: true
    owner: root
    group: root
    mode: "0600"
  when: not ssh_verify_success
  tags: [ssh, verify, rollback]

- name: "Rollback | Starte sshd nach Rollback neu"
  ansible.builtin.service:
    name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
    state: restarted
  when: not ssh_verify_success
  tags: [ssh, verify, rollback]

- name: "Rollback | Warte auf SSH nach Rollback"
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: 20
    state: started
  delegate_to: localhost
  become: false
  when: not ssh_verify_success
  tags: [ssh, verify, rollback]

- name: "Rollback | FEHLER melden und Playbook abbrechen"
  ansible.builtin.fail:
    msg: |
      🔴 HARDENING FEHLGESCHLAGEN - ROLLBACK DURCHGEFÜHRT
      Host: {{ inventory_hostname }} ({{ ansible_host }})
      -------------------------------------------------------
      Die originale SSH-Konfiguration wurde wiederhergestellt.
      Bitte prüfe:
        1. Ist der SSH-Key korrekt hinterlegt?
           cat {{ ssh_key_local_dir }}/{{ inventory_hostname }}/id_ed25519.pub
        2. Stimmt der Benutzer? ({{ ssh_deploy_user }})
        3. Manuelle Verbindung testen:
           ssh -i {{ ssh_key_local_dir }}/{{ inventory_hostname }}/id_ed25519 \
               {{ ssh_deploy_user }}@{{ ansible_host }}
  when: not ssh_verify_success
  tags: [ssh, verify, rollback]

# ---- ERFOLG -----------------------------------------------------------------

- name: "Verify | ✅ SSH-Verbindung erfolgreich verifiziert"
  ansible.builtin.debug:
    msg:
      - "✅ SSH-Verifikation ERFOLGREICH für {{ inventory_hostname }}"
      - "   Host:    {{ ansible_host }}:{{ ssh_port }}"
      - "   User:    {{ ssh_deploy_user }}"
      - "   Key:     {{ ssh_key_local_dir }}/{{ inventory_hostname }}/id_ed25519"
  when: ssh_verify_success
  tags: [ssh, verify]
