---
# =============================================================================
# OS Hardening | Sudo-Härtung
# =============================================================================

- name: "Sudo | visudo-Paket sicherstellen"
  ansible.builtin.package:
    name: sudo
    state: present
  tags: [os, sudo]

- name: "Sudo | Backup der sudoers-Datei"
  ansible.builtin.copy:
    src: /etc/sudoers
    dest: /etc/sudoers.hardening-backup
    remote_src: true
    force: false
    mode: "0440"
  tags: [os, sudo, backup]

- name: "Sudo | Gehärtete sudoers-Konfiguration deployen"
  ansible.builtin.template:
    src: sudoers-hardening.j2
    dest: /etc/sudoers.d/99-hardening
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"    # Syntaxprüfung VOR dem Schreiben
  tags: [os, sudo]

- name: "Sudo | sudo.conf konfigurieren"
  ansible.builtin.template:
    src: sudo.conf.j2
    dest: /etc/sudo.conf
    owner: root
    group: root
    mode: "0644"
  tags: [os, sudo]

- name: "Sudo | /etc/sudoers.d Verzeichnis absichern"
  ansible.builtin.file:
    path: /etc/sudoers.d
    owner: root
    group: root
    mode: "0750"
    state: directory
  tags: [os, sudo, permissions]

- name: "Sudo | Berechtigungen auf sudoers.d-Dateien prüfen"
  ansible.builtin.shell: |
    find /etc/sudoers.d -type f | while read f; do
      perm=$(stat -c "%a" "$f")
      if [ "$perm" != "440" ] && [ "$perm" != "400" ]; then
        echo "WARNUNG: $f hat Berechtigungen $perm"
        chmod 440 "$f"
      fi
    done
  args:
    executable: /bin/bash
  register: sudoers_perms
  changed_when: "'WARNUNG' in sudoers_perms.stdout"
  tags: [os, sudo, permissions]

- name: "Sudo | WARNUNG — sudoers.d-Dateien mit falschen Rechten korrigiert"
  ansible.builtin.debug:
    msg: "{{ sudoers_perms.stdout_lines }}"
  when: sudoers_perms.changed
  tags: [os, sudo, permissions]

- name: "Sudo | Prüfe NOPASSWD-Einträge (Sicherheitsrisiko)"
  ansible.builtin.shell: |
    grep -r "NOPASSWD" /etc/sudoers /etc/sudoers.d/ 2>/dev/null \
      | grep -v "^#" | grep -v "hardening" || true
  args:
    executable: /bin/bash
  register: nopasswd_entries
  changed_when: false
  tags: [os, sudo, audit]

- name: "Sudo | WARNUNG — NOPASSWD-Einträge gefunden"
  ansible.builtin.debug:
    msg: "⚠️  NOPASSWD-Einträge (prüfen ob gewollt):\n{{ nopasswd_entries.stdout }}"
  when: nopasswd_entries.stdout != ""
  tags: [os, sudo, audit]

- name: "Sudo | sudo-Log-Verzeichnis sicherstellen"
  ansible.builtin.file:
    path: "{{ os_sudo_log_dir }}"
    owner: root
    group: root
    mode: "0750"
    state: directory
  tags: [os, sudo]

# ── NOPASSWD-Einschränkung (Bootstrap → Hardened) ────────────────────────────
# Ersetzt das NOPASSWD: ALL des Bootstrap durch eine minimale Befehls-Liste.
# Läuft am ENDE von sudo.yml — alle vorherigen Tasks benötigen noch NOPASSWD: ALL.

- name: "Sudo | Deploy-User sudo auf minimale Befehle einschränken"
  ansible.builtin.copy:
    content: |
      # Ansible-managed — deploy user (Hardened — {{ ansible_date_time.date }})
      # Eingeschränkt durch os_hardening/tasks/sudo.yml (os_restrict_deploy_sudo)
      # Befehls-Liste konfigurierbar via ssh_deploy_sudo_commands in group_vars
      {{ ssh_deploy_user }} ALL=(ALL) NOPASSWD: {{ ssh_deploy_sudo_commands | join(', ') }}
    dest: "/etc/sudoers.d/{{ ssh_deploy_user }}"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  when:
    - os_restrict_deploy_sudo | default(true)
    - ssh_deploy_sudo_commands | default([]) | length > 0
  tags: [os, sudo, restrict]

- name: "Sudo | Info — NOPASSWD bleibt unverändert (os_restrict_deploy_sudo: false)"
  ansible.builtin.debug:
    msg: "ℹ️  sudo-Einschränkung übersprungen (os_restrict_deploy_sudo: false)"
  when: not (os_restrict_deploy_sudo | default(true))
  tags: [os, sudo, restrict]
